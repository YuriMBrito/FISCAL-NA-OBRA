<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiscal na Obra · Sistema de Fiscalização de Obras Públicas</title>
  <meta name="description" content="Sistema de fiscalização de obras públicas conforme Lei 14.133/2021.">
  <meta name="theme-color" content="#0d111a">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <script type="module" src="js/console-safety.js"></script>

  <script type="module" src="js/firebase-stub.js"></script>
  <script type="module" src="js/firebase-loader.js"></script>
  <script type="module" src="firebase-config.js"></script>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js" defer></script>
  
  <script>
    /* Carregamento dinâmico de bibliotecas pesadas para performance */
    (function() {
      const loadScript = (src, fallbackSrc, onLoad) => {
        const s = document.createElement('script');
        s.src = src;
        s.async = true;
        s.onerror = () => {
          const f = document.createElement('script');
          f.src = fallbackSrc;
          if(onLoad) f.onload = onLoad;
          document.head.appendChild(f);
        };
        if(onLoad) s.onload = onLoad;
        document.head.appendChild(s);
      };

      loadScript(
        'https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js',
        'https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js'
      );

      loadScript(
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js',
        'https://cdn.jsdelivr.net/npm/pdfjs-dist@3.11.174/build/pdf.min.js',
        () => {
          if (typeof pdfjsLib !== 'undefined') {
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
          }
        }
      );
    })();
  </script>

  <link rel="stylesheet" href="css/main.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/themes.css">
  <link rel="stylesheet" href="css/ux-enhancements.css">
  <link rel="stylesheet" href="css/design-system.css">
</head>

<body>
  <a href="#paginas-container" class="skip-link">Ir para o conteúdo principal</a>

  <div id="app-loader">
    <div style="font-size:42px">🏗️</div>
    <div class="loader-text">Fiscal na Obra v15</div>
    <div class="loader-bar-container">
      <div class="loader-bar-fill"></div>
    </div>
  </div>

  <div id="tela-login" style="display:none">
    <div class="login-painel-form">
      <div class="login-header">
        <div class="logo-box">FO</div>
        <h1>Fiscal na Obra</h1>
        <p>Lei 14.133/2021</p>
      </div>

      <div class="login-tabs">
        <button id="aba-entrar" data-action="_abaLogin" data-arg0='entrar' class="active">Entrar</button>
        <button id="aba-cadastrar" data-action="_abaLogin" data-arg0='cadastrar'>Cadastrar</button>
      </div>

      <div class="login-form-fields">
        <div class="input-group">
          <label for="login-email">E-mail</label>
          <input id="login-email" type="email" placeholder="seu@email.com">
        </div>
        <div class="input-group">
          <label for="login-senha">Senha</label>
          <input id="login-senha" type="password" placeholder="••••••••">
        </div>
        
        <button id="login-btn" data-action="_loginAction" class="btn-primary">🔐 ENTRAR NO SISTEMA</button>
      </div>
    </div>

    <div class="login-painel-visual">
      <img src="login-bg.webp" alt="Background">
      <div class="visual-overlay"></div>
      <div class="visual-content">
        <span>FISCAL NA OBRA</span>
        <h2>Controle de Obras Simplificado</h2>
      </div>
    </div>
  </div>

  <div id="app-shell" style="display:none">
    <aside id="sidebar" class="sidebar"></aside>
    <div class="app-main">
      <div id="fo-health-indicator" data-action="verPagina" data-arg0="diagnostico">
        <span class="dot"></span> <span>18/18</span>
      </div>
      <header id="topbar" class="topbar"></header>
      <main class="conteudo" id="paginas-container">
        <div id="dash-global" class="pagina ativa"></div>
        <div id="dashboard" class="pagina"></div>
        <div id="boletim" class="pagina"></div>
        <div id="memoria" class="pagina"></div>
        <div id="config" class="pagina"></div>
        </main>
    </div>
  </div>

  <script type="module" src="js/login-controller.js"></script>
  <script type="module" src="js/lgpd-consent.js"></script>
  <script type="module" src="js/inline-entry.js"></script>

</body>
</html>
